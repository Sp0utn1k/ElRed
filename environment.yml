# Environment setup for ElRed project
# To recreate the environment, run:
#   conda env create -p ./.conda -f environment.yml

name: elred
channels:
  - defaults
dependencies:
  - python=3.13
  - numpy
  - scipy
  - pyproj
  - scikit-learn
  - scikit-image
  - matplotlib
  - ipykernel
  - numba
  - pandas
  - folium
  - pip
  - plotly
  - nbformat>4.2.0
  - pip:
      - smallestenclosingcircle
      - offline_folium
